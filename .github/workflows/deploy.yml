name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # NOTE: We use `npm install` here, NOT `npm ci`.
      # Why: developer machines install through a corporate Artifactory
      # mirror (NPM_CONFIG_REGISTRY env var forces it), which resolves
      # transitive dependency trees slightly differently than npmjs.org.
      # The resulting `package-lock.json` shape (esp. for trystero's
      # libp2p subtree) doesn't match what `npm ci` derives on CI, so
      # `npm ci` fails with "Missing X from lock file" errors.
      # `npm install` re-resolves against the registry CI sees (npmjs.org
      # via the project-local .npmrc) and produces a working tree.
      # The commit-tracked package-lock.json still works locally for the
      # dev who created it — this just adds tolerance on the CI side.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
